# Engine API (FastAPI) manifest. scripts/build_engine_app.sh copies this to the assembled engine
# app source root (build/engine_app/app.yaml), which IS what the platform reads at deploy. The
# engine API deploys from that assembled dir (shared engine + engine_api/) because DABs forbids
# two apps sharing a source_code_path with the Streamlit app. Entrypoint reads DATABRICKS_APP_PORT
# in code (run.py), so no app.yaml env substitution is needed.
command:
  - python
  - engine_api/run.py
env:
  - name: APP_DOMAIN
    value: "recebiveis"
