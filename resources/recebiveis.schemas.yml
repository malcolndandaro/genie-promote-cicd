# Medallion schemas for the recebíveis domain (issue S01): raw → trusted →
# refined → diamond, inside ${env}_${domain}. Diamond (gold/certified) is the
# layer Genie consumes, so the consumer group gets USE_SCHEMA + SELECT there.
resources:
  schemas:
    raw:
      catalog_name: "${var.env}_${var.domain}"
      name: raw
      comment: "Raw / landing"
    trusted:
      catalog_name: "${var.env}_${var.domain}"
      name: trusted
      comment: "Trusted"
    refined:
      catalog_name: "${var.env}_${var.domain}"
      name: refined
      comment: "Refined"
    diamond:
      catalog_name: "${var.env}_${var.domain}"
      name: diamond
      comment: "Diamond / certified — consumed by Genie (grants applied by the setup job)"
