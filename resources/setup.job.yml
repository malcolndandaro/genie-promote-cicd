# DABs-deployed setup job (issue S01). Serverless. Seeds synthetic recebíveis data
# into the target's diamond schema. Idempotent (overwrites), so re-running against a
# fresh workspace recreates everything (ADR-0004). Catalog is passed in, never hardcoded.
resources:
  jobs:
    setup:
      name: "[${bundle.target}] recebiveis-setup"
      max_concurrent_runs: 1
      tasks:
        - task_key: seed_recebiveis
          notebook_task:
            notebook_path: ../src/setup/seed_recebiveis.py
            base_parameters:
              catalog: "${var.env}_${var.domain}"
              env: "${var.env}"
              consumer_group: "${var.consumer_group}"
