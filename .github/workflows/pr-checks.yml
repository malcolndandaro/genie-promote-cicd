name: pr-checks

# S3 — deterministic gate on every PR: the bundle must validate against prod
# before a human (or the agent, added in S4/S5) ever looks at it. The full
# deterministic suite (JSON schema, identifier allowlist ^prod_<domain>\.,
# pre-render) is layered on in S4 — this is the deployability floor.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

env:
  DATABRICKS_BUNDLE_ENGINE: direct

jobs:
  validate:
    name: bundle validate (prod)
    runs-on: self-hosted   # workspace IP-ACL blocks hosted runners
    if: vars.DATABRICKS_PROD_HOST != ''
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_PROD_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_PROD_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_PROD_SP_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
        with:
          version: 1.4.0
      - name: Unit tests (engine + engine API)
        run: |
          python3 -m pip install -q 'databricks-sdk>=0.111.0' fastapi uvicorn httpx pytest
          python3 -m pytest tests/ -q
      - name: Pre-render + identifier allowlist (rejects foreign-env / cross-domain refs)
        run: bash scripts/render.sh prod
      - name: Stub the app source dir (ADR-0006/A1 — promote_app now targets prod)
        # `bundle validate -t prod` only needs build/promote_app to EXIST (an empty dir validates
        # with a warning, no error). Deliberately do NOT run the full build_promote_app.sh here — the
        # heavy Svelte `npm install && npm run build` belongs in deploy.yml only, so an unrelated
        # code PR's deployability check never depends on npm-registry reachability or SPA build health.
        run: mkdir -p build/promote_app
      - name: Validate bundle (prod target)
        run: databricks bundle validate -t prod --var "warehouse_id=${{ vars.DATABRICKS_PROD_WAREHOUSE_ID }}"
      - name: GRANT-01 — every declared principal can SELECT the prod tables (governance gate)
        # Runs as the prod SP (job env), so it has the prod-catalog visibility the dev-hosted
        # app lacks. Fails the PR if the base consumer group OR any principal declared in a
        # promotion's AccessSpec sidecar (F2 — <slug>.access.json, copied forward by render.sh) is
        # missing SELECT on any space table. Loops over every rendered space (a PR only ever
        # touches ONE space's files in practice, per-space promotion, but this stays correct if
        # more than one is ever rendered in the same run).
        run: |
          python3 -m pip install -q 'databricks-sdk>=0.111.0'
          for f in build/genie/*.serialized_space.json; do
            [ -f "$f" ] || continue
            slug="$(basename "$f" .serialized_space.json)"
            python3 scripts/check_grants.py "$f" "${{ vars.DATABRICKS_CONSUMER_GROUP || 'account users' }}" "build/genie/${slug}.access.json"
          done
