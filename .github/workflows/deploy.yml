name: deploy

# S3 — PR-triggered promotion to prod. On merge to main, the per-domain CI/CD
# service principal deploys the bundle to the prod/portal workspace, behind a
# GitHub Environment gate (the Steward approves — SoD per ADR-0002). Authoring
# happens in the dev workspace (native Genie); this pipeline only promotes.
#
# runs-on: self-hosted because both workspaces enforce IP access lists, which
# reject GitHub-hosted runner egress (see SETUP.md → runner registration).
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never kill an approved, mid-deploy run

env:
  # Catalog + genie_spaces resources require the direct deployment engine (ADR-0004 / S2).
  DATABRICKS_BUNDLE_ENGINE: direct

jobs:
  deploy-prod:
    name: Promote to prod (Steward approval)
    runs-on: self-hosted
    # Gated until the CI/CD service principal vars/secrets are set (SETUP.md / provision_ci.sh).
    if: vars.DATABRICKS_PROD_HOST != ''
    environment: prod   # required-reviewer gate — pauses for the Steward's approval
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_PROD_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_PROD_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_PROD_SP_SECRET }}
      # A1/A2 (ADR-0006): the prod-hosted app reaches into DEV via the dev-reader SP. build_promote_app.sh
      # bakes APP_DEV_HOST into app.yaml from BUNDLE_DEV_HOST. Config-driven (ADR-0004) — set per deployment.
      BUNDLE_DEV_HOST: ${{ vars.DATABRICKS_DEV_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
        with:
          version: 1.4.0   # pin the CLI (demo stability — genie_spaces + direct engine need >=1.4.0)
      - name: Pre-render serialized_space (dev_->prod_) + allowlist check
        run: bash scripts/render.sh prod
      - name: Assemble the app source (ADR-0006/A1 — promote_app now deploys to prod)
        run: bash scripts/build_promote_app.sh
      - name: Deploy bundle to prod
        run: databricks bundle deploy -t prod --var "warehouse_id=${{ vars.DATABRICKS_PROD_WAREHOUSE_ID }}"
      - name: Apply declared access (F2 — governed enforcement, prod SP, per-Space group)
        # The ONLY place an AccessSpec sidecar (<slug>.access.json, F2) actually mutates prod: the
        # per-Space group's membership + UC SELECT grants + Genie Space permissions. Runs AFTER the
        # deploy (so each genie_spaces resource — and the Space it manages — already exists) and AS
        # the prod SP (same identity/job as the deploy + GRANT-01) — never app-direct. A space with
        # no AccessSpec sidecar is a no-op. apply_access.py resolves the deployed Space's live id by
        # matching the <slug>.title sidecar via genie.list_spaces() (the id is NOT in bundle summary
        # or the committed serialized_space) and FAILS the step if it can't — never warn-and-skip,
        # which would silently leave declared access unapplied (defeats F2's governance).
        run: |
          python3 -m pip install -q 'databricks-sdk>=0.111.0'
          for f in build/genie/*.serialized_space.json; do
            [ -f "$f" ] || continue
            slug="$(basename "$f" .serialized_space.json)"
            [ -f "build/genie/${slug}.access.json" ] || continue   # nothing declared -> skip entirely
            title="$(cat "build/genie/${slug}.title" 2>/dev/null || true)"
            python3 scripts/apply_access.py "$f" "build/genie/${slug}.access.json" "$title"
          done
      - name: Make deployed spaces visible to the app (CAN_READ -> app SP, idempotent)
        # The prod-hosted app lists/exports prod Spaces as its own SP; without a per-Space ACL the
        # Space is invisible to the app's pickers (Acesso / Trazer de volta) — found live. Runs for
        # EVERY deployed space (unlike apply_access, which only runs when an AccessSpec sidecar
        # exists) so no manual grant is ever needed again. See scripts/grant_app_sp_read.py.
        run: |
          python3 -m pip install -q 'databricks-sdk>=0.111.0'
          for f in build/genie/*.serialized_space.json; do
            [ -f "$f" ] || continue
            slug="$(basename "$f" .serialized_space.json)"
            title="$(cat "build/genie/${slug}.title" 2>/dev/null || true)"
            [ -n "$title" ] || { echo "no .title sidecar for ${slug}; cannot resolve space id" >&2; exit 1; }
            python3 scripts/grant_app_sp_read.py "$title"
          done
