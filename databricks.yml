# Genie/AI-BI Promotion — DABs bundle.
#
# Portable by construction (ADR-0004): NO workspace is hardcoded. The target workspace
# comes from your environment, NOT this file — set DATABRICKS_HOST (CI: from a repo
# variable, see .github/workflows) or use a CLI profile (`-p <profile>`) locally. The
# SQL warehouse is a variable (set per target below or override in CI via --var).
# Switching workspaces touches no source — just your env/profile + warehouse value.
# All-DABs, no Terraform.
bundle:
  name: genie-promote

include:
  - resources/*.yml
  # Generated by scripts/render.sh (run before validate/deploy): one prod genie_spaces resource per
  # promoted space (per-space promotion). Glob so it's a no-op until render has produced it.
  - build/*.gen.yml

# build/ is gitignored (generated), but the single app's source_code_path points into it
# (build/promote_app, assembled by scripts/build_promote_app.sh). Force the sync to upload it so
# the app's source resolves in the workspace.
sync:
  include:
    - build/promote_app/**

variables:
  domain:
    description: UC data domain. The catalog is ${var.env}_${var.domain}.
    default: recebiveis
  env:
    description: Environment prefix for the catalog (dev|prod). Set per target.
  warehouse_id:
    description: SQL warehouse id. Set per target, or override in CI via --var.
  consumer_group:
    description: UC group that consumes the domain's diamond (gold) layer.
    default: account users
  # Lakebase (Databricks Postgres) — durable promotion state/audit/cache (ADR-0005). Config-driven
  # (ADR-0004): a new customer changes these + redeploys, nothing else. Lakebase now lives in PROD
  # with the app (ADR-0006 — the app is a durable, prod-hosted control plane that reaches into dev;
  # supersedes ADR-0002's "app is the dev front door" framing). Prod is the durable control plane;
  # dev's prior Lakebase state was disposable demo data (fresh start in prod, no migration — ADR-0006).
  lakebase_instance:
    description: >-
      Lakebase Postgres instance name. CHANGE THIS per deployment (the default is this
      deployment's name); isolation is per-workspace. The app recovers the name at runtime
      from PGHOST, so any value works without further wiring.
    default: genie-promote
  lakebase_database:
    description: >-
      Postgres database the app uses. databricks_postgres is the Lakebase platform default —
      change only for database-level isolation within the same instance.
    default: databricks_postgres
  lakebase_capacity:
    description: Lakebase instance SKU (CU_1 is the autoscaling floor, scale-to-zero).
    default: CU_1
  # Cross-workspace client factory (ADR-0006/A1): the prod-hosted app reaches into DEV for the two
  # Genie-API operations that must run there (export at promotion time; F1's future rehydrate write).
  # NO host is hardcoded (ADR-0004) — the dev workspace URL is itself config. The dev-reader/writer SP
  # credentials are NEVER bundle variables (they're secrets) — they're read at runtime from a
  # Databricks secret scope, named here so the scope/keys are config-driven too. The SP itself is
  # provisioned in A2 (scripts/provision_dev_sp.sh, per SP2's self-heal finding); A1 only wires the
  # shape + config so the factory's dev-remote-SP path constructs lazily and is unit-testable now.
  dev_host:
    description: >-
      DEV workspace URL the prod-hosted app reaches into (Genie export at promotion time; F1
      rehydrate). Injected to the app as APP_DEV_HOST. Set per deployment — never hardcoded.
    default: https://your-dev-workspace.cloud.databricks.com
  dev_warehouse_id:
    description: >-
      Dev SQL warehouse id the rehydrate flow binds recreated dev Spaces to (A3/G5). Injected to
      the app as APP_DEV_WAREHOUSE_ID. Set per deployment — never hardcoded.
    default: your-dev-warehouse-id
  dev_sp_secret_scope:
    description: >-
      Databricks secret scope holding the dev-reader/writer SP's OAuth M2M credentials
      (keys: dev_sp_client_id, dev_sp_client_secret). Provisioned + populated in A2.
    default: genie_promote
  # Prod Lakebase direct-access control (A1 acceptance criteria): who may query the prod Lakebase
  # instance DIRECTLY (bypassing the app) now that it holds the governance system's most sensitive
  # data (who-can-see-what, who-approved-what). Comma-separated emails; config-driven (ADR-0004).
  # See ADR-0006 for the control's rationale and enforcement mechanism (Lakebase role grants).
  lakebase_direct_access_admins:
    description: >-
      Comma-separated emails/service-principal names allowed to connect to the prod Lakebase
      instance directly (outside the app). Enforced via Lakebase role grants (see ADR-0006);
      everyone else reaches promotion data only through the app's own role-gating.
    default: ""
  # The catalog ${env}_${domain} is expected to exist — create it in the UI (Default
  # Storage), or add a resources/*.catalog.yml if your deployer has CREATE CATALOG on the
  # metastore. DABs owns the schemas, grants (via the setup job), and seed data on top.

targets:
  # No workspace.host here: it's resolved from DATABRICKS_HOST (env) or your CLI profile,
  # so the same bundle works on any workspace. No `mode: development` -> deterministic names.
  dev:
    default: true
    variables:
      env: dev
      warehouse_id: your-dev-warehouse-id
    # DEV keeps only the setup job (seeds synthetic data) — authoring happens in dev's native Genie
    # UI (US-2), unchanged. The app + its Lakebase state moved to PROD (ADR-0006/A1): dev is wiped on
    # a ~7-day cycle (SP2), so durable governance state (audit/roles/history) cannot live here. The
    # gated CI prod-deploy (SP) never touches dev resources.

  prod:
    variables:
      env: prod
      warehouse_id: your-prod-warehouse-id
      # dev_host / dev_sp_secret_scope / lakebase_direct_access_admins keep their top-level defaults
      # here (this target doesn't override them) — set per deployment by overriding the top-level
      # variable default above, or via `--var` at deploy time.
    # Promoted resources are PROD-only: dev is human-authored (native Genie), prod is bundle-managed.
    # The per-space `genie_spaces` resources are GENERATED by scripts/render.sh into build/*.gen.yml
    # (one per promoted space) — see the include above. The dashboard stays inline below.
    #
    # The app + its Lakebase state now live HERE (ADR-0006/A1): prod is the durable control plane
    # (survives the dev wipe); the app reaches into dev only for the two Genie-API ops that must run
    # there, via the cross-workspace client factory (app/app_logic.py::_client, scope="dev-sp").
    resources:
      # Lakebase (Databricks Postgres) — durable promotion index/audit/cache (ADR-0005/0006). Backs
      # the prod-hosted app. The `/database/` API provisions an autoscaling-backed instance (CU_1
      # floor, scale-to-zero) — not a fixed bill. Fresh-customer bootstrap order: this + the app
      # resource below must deploy before the governance console is usable (ADR-0006).
      database_instances:
        promote_db:
          name: ${var.lakebase_instance}
          capacity: ${var.lakebase_capacity}
      apps:
        # Deploys from an ASSEMBLED dir (shared engine + engine_api/ + Svelte static/ + app.yaml),
        # built by scripts/build_promote_app.sh BEFORE deploy. Business Authors get `CAN_USE` on this
        # app resource only (least privilege, standard Apps OBO) — no broad prod data grant; see
        # ADR-0006 and README for the permission to apply post-deploy (per-workspace, not bundle-owned
        # here to avoid clobbering the platform-managed app ACL on redeploy).
        promote_app:
          name: "genie-promote-app"
          description: "Single front door (FastAPI + Svelte SPA): OBO Genie reads, review, SoD."
          source_code_path: ./build/promote_app
          user_api_scopes:
            - dashboards.genie
          # Bind the Lakebase instance to the app: grants the app SP CAN_CONNECT_AND_CREATE and makes
          # the platform inject PG* env (PGHOST/PGPORT/PGDATABASE/PGUSER/PGSSLMODE) — the app connects
          # as its SP via short-lived OAuth, NO static password (US-11). Referencing the instance via
          # ${resources...} creates a deploy-ordering edge so the instance is AVAILABLE first.
          resources:
            - name: promotion-db
              database:
                instance_name: ${resources.database_instances.promote_db.name}
                database_name: ${var.lakebase_database}
                permission: CAN_CONNECT_AND_CREATE
      # An AI/BI dashboard promoted through the SAME pipeline (pre-render + allowlist +
      # DABs deploy); no eval-run (a dashboard has no benchmark questions).
      dashboards:
        recebiveis_painel:
          display_name: "Painel de Recebíveis — Volume por Bandeira"
          warehouse_id: ${var.warehouse_id}
          file_path: ./build/dashboards/recebiveis.lvdash.json
